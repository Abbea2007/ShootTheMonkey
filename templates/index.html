<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoot the Monkey — Movimiento Parabólico</title>
  <!--
    Flask sirve archivos estáticos desde la carpeta static/.
    url_for('static', filename='...') genera la ruta correcta automáticamente.
  -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header>
    <h1>🎯 Shoot the Monkey</h1>
    <p class="subtitle">Demostración de movimiento parabólico y caída libre</p>
  </header>

  <main>

    <!-- ── Panel de controles ─────────────────────────────── -->
    <section class="panel-controles">
      <h2>Parámetros</h2>

      <div class="control-group">
        <label for="vel">Velocidad inicial <span class="unit">m/s</span></label>
        <input type="range" id="vel" min="10" max="60" value="30" step="1">
        <span class="valor" id="vel-val">30</span>
      </div>

      <div class="control-group">
        <label for="dist">Distancia al mono <span class="unit">m</span></label>
        <input type="range" id="dist" min="10" max="55" value="35" step="1">
        <span class="valor" id="dist-val">35</span>
      </div>

      <div class="control-group">
        <label for="altura">Altura del mono <span class="unit">m</span></label>
        <input type="range" id="altura" min="5" max="30" value="20" step="1">
        <span class="valor" id="altura-val">20</span>
      </div>

      <div class="control-group">
        <label for="gravedad">Gravedad <span class="unit">m/s²</span></label>
        <input type="range" id="gravedad" min="1" max="20" value="9.8" step="0.1">
        <span class="valor" id="gravedad-val">9.8</span>
      </div>

      <div class="botones">
        <button id="btn-disparar" class="btn-primario">▶ Disparar</button>
        <button id="btn-reset" class="btn-secundario">↺ Reiniciar</button>
      </div>

      <!-- Datos calculados que vienen desde Python/Flask -->
      <div class="info-box" id="info-box">
        <p>Ajustá los parámetros y presioná <strong>Disparar</strong>.</p>
      </div>
    </section>

    <!-- ── Canvas de simulación ───────────────────────────── -->
    <section class="panel-canvas">
      <!--
        <canvas> es el elemento HTML donde JavaScript dibuja la simulación.
        Toda la animación se hace con la Canvas API (sin librerías externas).
      -->
      <canvas id="canvas" width="700" height="420"></canvas>
      <div class="leyenda">
        <span class="leyenda-item"><span class="dot naranja"></span> Proyectil</span>
        <span class="leyenda-item"><span class="dot celeste"></span> Mono</span>
        <span class="leyenda-item"><span class="dot gris"></span> Sin gravedad (referencia)</span>
      </div>
    </section>

  </main>

  <script src="{{ url_for('static', filename='simulation.js') }}"></script>
</body>
</html>
